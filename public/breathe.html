<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relaksasi & Meditasi - UB Wellness</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #050505;
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Latar Belakang Ambient Dinamis */
        .ambient-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(14, 165, 233, 0.1) 0%, rgba(5, 5, 5, 1) 70%);
            z-index: 0;
            transition: background 2s ease;
        }

        /* Lingkaran Pernapasan (Breathing Visualizer) */
        .breathing-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            position: relative;
        }

        .breathing-circle {
            width: 250px; 
            height: 250px;
            background: rgba(14, 165, 233, 0.05);
            border: 2px solid rgba(14, 165, 233, 0.3);
            border-radius: 50%;
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-weight: 300; 
            font-size: 1.5rem; 
            color: #f8fafc;
            letter-spacing: 2px;
            box-shadow: 0 0 50px rgba(14, 165, 233, 0.1);
            transition: all 4s ease-in-out; /* Animasi mulus untuk Inhale/Exhale */
        }

        /* Kelas Status Pernapasan */
        .inhale {
            transform: scale(1.6);
            background: rgba(16, 185, 129, 0.1); /* Hijau teduh saat narik napas */
            border-color: rgba(16, 185, 129, 0.5);
            box-shadow: 0 0 80px rgba(16, 185, 129, 0.3);
            color: #10b981;
        }
        .hold {
            transform: scale(1.6); /* Tetap besar saat ditahan */
            background: rgba(245, 158, 11, 0.1); /* Kuning hangat */
            border-color: rgba(245, 158, 11, 0.5);
            box-shadow: 0 0 60px rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }
        .exhale {
            transform: scale(1); /* Mengecil saat hembuskan */
            background: rgba(14, 165, 233, 0.05); /* Kembali ke biru awal */
            border-color: rgba(14, 165, 233, 0.3);
            box-shadow: 0 0 40px rgba(14, 165, 233, 0.1);
            color: #0ea5e9;
        }

        /* Kontrol Suara (Soundscapes) */
        .controls-panel {
            z-index: 1;
            padding: 30px 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .sound-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #94a3b8;
            padding: 12px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sound-btn:hover, .sound-btn.active {
            background: rgba(14, 165, 233, 0.2);
            border-color: #0ea5e9;
            color: #f8fafc;
            transform: translateY(-3px);
        }

        .btn-back {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 2;
            background: rgba(255,255,255,0.05);
            border: none;
            color: #94a3b8;
            padding: 8px 16px;
            border-radius: 20px;
            transition: 0.2s;
        }
        .btn-back:hover { background: rgba(255,255,255,0.1); color: white; }

        /* Hide Audio Player */
        audio { display: none; }
    </style>
</head>
<body>

<div class="ambient-bg" id="ambientBg"></div>

<button class="btn-back" onclick="kembaliKeDashboard()">< 🔙 Kembali ke Ruang Tenang</button>
<div style="position: absolute; top: 25px; width: 100%; z-index: 1;">
    <h5 class="text-center text-muted fw-light" style="letter-spacing: 3px;">FOKUS PERNAPASAN</h5>
</div>

<div class="breathing-container">
    <div class="breathing-circle" id="breatheText">Mulai</div>
</div>

<div class="controls-panel">
    <div class="container text-center">
        <p class="text-muted small mb-3 text-uppercase" style="letter-spacing: 2px;">Pilih Suasana Lingkungan (Soundscape)</p>
        <div class="d-flex justify-content-center flex-wrap gap-3">
            <button class="sound-btn" onclick="playSound('rain', this)">🌧️ Hujan Deras</button>
            <button class="sound-btn" onclick="playSound('forest', this)">🌲 Hutan Pinus</button>
            <button class="sound-btn" onclick="playSound('waves', this)">🌊 Ombak Pantai</button>
            <button class="sound-btn" onclick="playSound('brown_noise', this)">🤎 Brown Noise</button>
            <button class="sound-btn border-danger text-danger bg-transparent" onclick="stopAllSounds()">🔇 Matikan Suara</button>
        </div>
    </div>
</div>

<audio id="audio-rain" loop src="https://cdn.pixabay.com/download/audio/2021/08/09/audio_82c2354cf6.mp3?filename=heavy-rain-nature-sounds-8186.mp3"></audio>
<audio id="audio-forest" loop src="https://cdn.pixabay.com/download/audio/2021/08/09/audio_69e3650462.mp3?filename=forest-with-small-river-birds-and-nature-field-recording-6735.mp3"></audio>
<audio id="audio-waves" loop src="https://cdn.pixabay.com/download/audio/2022/02/07/audio_d0862b2575.mp3?filename=ocean-waves-112906.mp3"></audio>
<audio id="audio-brown_noise" loop src="https://cdn.pixabay.com/download/audio/2023/04/18/audio_13a373b88b.mp3?filename=brown-noise-145636.mp3"></audio>

<script>
    const CURRENT_USER_ID = new URLSearchParams(window.location.search).get('userId');

    function kembaliKeDashboard() {
        if (CURRENT_USER_ID) {
            window.location.href = `student.html?userId=${CURRENT_USER_ID}`;
        } else {
            window.location.href = 'login.html';
        }
    }

    const circle = document.querySelector('.breathing-circle');
    const text = document.getElementById('breatheText');
    const bg = document.getElementById('ambientBg');
    
    // Waktu dalam milidetik (Total 1 putaran = 19 detik)
    const inhaleTime = 4000;  // 4 detik tarik
    const holdTime = 7000;    // 7 detik tahan
    const exhaleTime = 8000;  // 8 detik hembus

    function breathAnimation() {
        // 1. Tarik Napas (Inhale)
        text.innerText = "Tarik Napas";
        circle.className = "breathing-circle inhale";
        bg.style.background = "radial-gradient(circle at center, rgba(16, 185, 129, 0.15) 0%, rgba(5, 5, 5, 1) 70%)";
        
        // 2. Tahan Napas (Hold)
        setTimeout(() => {
            text.innerText = "Tahan";
            circle.className = "breathing-circle hold";
            bg.style.background = "radial-gradient(circle at center, rgba(245, 158, 11, 0.1) 0%, rgba(5, 5, 5, 1) 70%)";
            
            // 3. Hembuskan (Exhale)
            setTimeout(() => {
                text.innerText = "Hembuskan";
                circle.className = "breathing-circle exhale";
                bg.style.background = "radial-gradient(circle at center, rgba(14, 165, 233, 0.1) 0%, rgba(5, 5, 5, 1) 70%)";
            }, holdTime);

        }, inhaleTime);
    }

    // Mulai animasi pertama kali, lalu ulangi terus menerus
    setTimeout(breathAnimation, 1000); // Jeda 1 detik saat masuk halaman
    setInterval(breathAnimation, inhaleTime + holdTime + exhaleTime);

    // --- LOGIKA SOUNDSCAPE (AUDIO) ---
    const audios = {
        'rain': document.getElementById('audio-rain'),
        'forest': document.getElementById('audio-forest'),
        'waves': document.getElementById('audio-waves'),
        'brown_noise': document.getElementById('audio-brown_noise')
    };

    function stopAllSounds() {
        // Matikan semua audio
        Object.values(audios).forEach(audio => {
            audio.pause();
            audio.currentTime = 0; // Reset ke awal
        });
        // Hapus kelas aktif dari semua tombol
        document.querySelectorAll('.sound-btn').forEach(btn => btn.classList.remove('active'));
    }

    function playSound(type, btnElement) {
        // Matikan yang lain dulu
        stopAllSounds();
        
        if(audios[type]) {
            audios[type].volume = 0.5; // Set volume 50% biar nyaman
            audios[type].play().catch(e => console.log("Browser memblokir autoplay audio:", e));
            btnElement.classList.add('active');
        }
    }
</script>

</body>
</html>
